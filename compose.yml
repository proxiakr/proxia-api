services:
  postgres:
    image: postgres:17-alpine
    container_name: proxia-postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: proxia
      POSTGRES_USER: proxia
      POSTGRES_PASSWORD: proxia
    volumes:
      - ./.compose/postgres/data:/var/lib/postgresql/data

  redis:
    image: redis:7.0-alpine
    container_name: proxia-redis
    ports:
      - 6379:6379