services:
  postgres:
    image: postgres:16
    container_name: proxia-postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proxia-network

  redis:
    image: redis:7.0-alpine
    container_name: proxia-redis
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    networks:
      - proxia-network

volumes:
  postgres_data:
  redis_data:

networks:
  proxia-network: