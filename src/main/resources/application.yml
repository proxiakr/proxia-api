spring:
  application:
    name: proxia
    version: 1.0.0
  jpa:
    open-in-view: false

jwt:
  secret-key: ${JWT_SECRET_KEY}
  access-token-expiration: 3600000
  refresh-token-expiration: 86400000

encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY:default-encryption-key-change-in-production}

oauth2:
  github:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}

git:
  integration:
    github:
      client-id: ${GIT_INTEGRATION_GITHUB_CLIENT_ID}
      client-secret: ${GIT_INTEGRATION_GITHUB_CLIENT_SECRET}

reverse-proxy:
  type: ${REVERSE_PROXY_TYPE:nginx}
  nginx:
    enabled: ${NGINX_ENABLED:true}
    config-dir: ${NGINX_CONFIG_DIR:/etc/nginx/conf.d}
    ssl:
      enabled: ${NGINX_SSL_ENABLED:false}
      cert-dir: ${NGINX_SSL_CERT_DIR:/etc/letsencrypt/live}
  cloudflare:
    enabled: ${CLOUDFLARE_ENABLED:false}
    api-token: ${CLOUDFLARE_API_TOKEN:}
    base-domain: ${BASE_DOMAIN:proxia.kr}
    zone-id: ${CLOUDFLARE_ZONE_ID:}
    tunnel:
      id: ${CLOUDFLARE_TUNNEL_ID:}
      name: ${CLOUDFLARE_TUNNEL_NAME:proxia-tunnel}
      config-path: ${CLOUDFLARE_TUNNEL_CONFIG_PATH:/etc/cloudflared}

container:
  docker:
    host: ${DOCKER_HOST:unix:///var/run/docker.sock}
    tls:
      enabled: ${DOCKER_TLS_ENABLED:false}
      verify: ${DOCKER_TLS_VERIFY:true}
      cert-path: ${DOCKER_CERT_PATH:}
    network:
      name: ${DOCKER_NETWORK_NAME:proxia-network}
    registry:
      url: ${DOCKER_REGISTRY_URL:}
      username: ${DOCKER_REGISTRY_USERNAME:}
      password: ${DOCKER_REGISTRY_PASSWORD:}

webhook:
  github:
    secret: ${GITHUB_WEBHOOK_SECRET:}

---
spring.config.activate.on-profile: local

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:proxia;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true

---
spring.config.activate.on-profile: dev